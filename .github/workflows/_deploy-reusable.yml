name: Deploy Shared via Cloudflare WARP

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_branch:
        required: true
        type: string
      deploy_image_tag:
        required: false
        type: string
        default: latest
      deploy_sha:
        required: true
        type: string
    secrets:
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true
      CF_TEAM_NAME:
        required: true
      DEPLOY_HOST:
        required: true
      DEPLOY_KNOWN_HOSTS:
        required: true
      DEPLOY_PATH:
        required: true
      DEPLOY_SSH_KEY:
        required: true
      DEPLOY_USER:
        required: true
      # Optional — required for the post-deploy WARP registration revoke
      # (`Revoke WARP registration via Cloudflare API` step). When unset, the
      # revoke step no-ops with a log line and the deploy still completes,
      # so this stays optional for backward compatibility with any caller
      # that hasn't provisioned the API token / account id yet.
      CF_API_TOKEN:
        required: false
      CF_ACCOUNT_ID:
        required: false

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
      DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      DEPLOY_IMAGE_TAG: ${{ inputs.deploy_image_tag }}
      DEPLOY_SHA: ${{ inputs.deploy_sha }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - name: Install WARP
        run: |
          set -euo pipefail
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Configure WARP MDM
        run: |
          set -euo pipefail
          sudo install -d -m 700 /var/lib/cloudflare-warp
          sudo install -m 600 /dev/null /var/lib/cloudflare-warp/mdm.xml
          cat <<EOF | sudo tee /var/lib/cloudflare-warp/mdm.xml >/dev/null
          <dict>
              <key>auth_client_id</key>
              <string>${{ secrets.CF_ACCESS_CLIENT_ID }}</string>
              <key>auth_client_secret</key>
              <string>${{ secrets.CF_ACCESS_CLIENT_SECRET }}</string>
              <key>auto_connect</key>
              <integer>1</integer>
              <key>onboarding</key>
              <false/>
              <key>organization</key>
              <string>${{ secrets.CF_TEAM_NAME }}</string>
              <key>service_mode</key>
              <string>warp</string>
          </dict>
          EOF
          sudo chmod 600 /var/lib/cloudflare-warp/mdm.xml

      - name: Start WARP daemon
        run: |
          set -euo pipefail
          sudo systemctl daemon-reload
          sudo systemctl enable --now warp-svc
          sleep 10

      - name: Register and connect WARP
        run: |
          set -euo pipefail
          warp-cli --accept-tos registration new
          warp-cli --accept-tos connect
          # Trust only the unambiguous success signal: `Status update: Connected`.
          # Every other state — `Daemon Startup`, `Connecting`, `Updating`,
          # transient `Unable` immediately after `connect`, etc. — is treated
          # as "still in progress, keep polling." Both `registration new` and
          # `connect` exit 0 even when Zero Trust later rejects the registration
          # (e.g. `Registration Missing due to: Does not exist in API` when the
          # device pool is exhausted), so we cannot rely on their exit codes.
          # On timeout, dump the full status output (including the `Reason:`
          # line) so the next operator sees the actual rejection cause instead
          # of a generic SSH timeout 30s later in the next step.
          deadline=$((SECONDS + 60))
          while [ "$SECONDS" -lt "$deadline" ]; do
            if warp-cli --accept-tos status 2>/dev/null | grep -q '^Status update: Connected'; then
              echo "WARP connected"
              exit 0
            fi
            sleep 2
          done
          echo "WARP failed to reach Connected within 60s; final status:" >&2
          warp-cli --accept-tos status >&2 || true
          exit 1

      - name: Install SSH materials
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Verify SSH connectivity and remote files
        run: |
          set -euo pipefail
          case "$DEPLOY_ENVIRONMENT" in
            production)
              remote_env_file="$DEPLOY_PATH/infra/docker/.env.prod"
              remote_compose_file="$DEPLOY_PATH/infra/docker/docker-compose.prod.yml"
              ;;
            dev)
              remote_env_file="$DEPLOY_PATH/infra/docker/.env.dev"
              remote_compose_file="$DEPLOY_PATH/infra/docker/docker-compose.dev.yml"
              ;;
            *)
              echo "ERROR: Unsupported deploy environment: $DEPLOY_ENVIRONMENT" >&2
              exit 1
              ;;
          esac
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o IdentitiesOnly=yes \
            -o LogLevel=ERROR \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "test -f '$DEPLOY_PATH/infra/scripts/deploy.sh' && test -f '$remote_compose_file' && test -f '$remote_env_file' && docker compose version >/dev/null"

      - name: Run remote deploy
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o IdentitiesOnly=yes \
            -o LogLevel=ERROR \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash '$DEPLOY_PATH/infra/scripts/deploy.sh' --environment '$DEPLOY_ENVIRONMENT' --branch '$DEPLOY_BRANCH' -t '$DEPLOY_IMAGE_TAG' '$DEPLOY_SHA'"

      - name: Collect failure diagnostics
        if: failure()
        run: |
          set +e
          warp-cli --accept-tos status || true
          sudo systemctl status warp-svc --no-pager || true

      - name: Disconnect WARP
        if: always()
        run: |
          # Local cleanup only — closes the WARP tunnel from the runner side.
          # Does not remove the device row from the Zero Trust dashboard;
          # that's done in the next step via the Cloudflare API.
          set +e
          warp-cli --accept-tos disconnect || true

      - name: Revoke WARP registration via Cloudflare API
        if: always()
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Each CI run creates a fresh device registration under the
          # non_identity@<team>.cloudflareaccess.com service-token pseudo-user.
          # MDM-enrolled clients cannot self-revoke (`warp-cli registration
          # delete` returns "Operation not authorized in this context"), so
          # we have to call Cloudflare's management API directly. Without
          # this cleanup, orphan registrations accumulate, eventually hit
          # the per-user device cap, and subsequent registrations get
          # silently invalidated (Unable(RegistrationMissing(Invalidated(
          # ApiMismatch)))). Free/Team plans don't expose bulk revoke in
          # the UI, so this step is the only sustainable cleanup.
          set +e
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ACCOUNT_ID" ]; then
            echo "CF_API_TOKEN or CF_ACCOUNT_ID not configured; skipping API revoke."
            echo "Device row will persist in the Zero Trust dashboard until manually deleted."
            exit 0
          fi
          reg_id=$(warp-cli --accept-tos registration show 2>/dev/null \
                    | awk -F': *' '/^ID:/ {print $2; exit}')
          if [ -z "$reg_id" ]; then
            echo "No registration id surfaced by warp-cli (WARP may never have connected); nothing to revoke."
            exit 0
          fi
          echo "Revoking WARP registration $reg_id from Cloudflare account ${CF_ACCOUNT_ID}"
          # The REST contract is `DELETE /accounts/{id}/devices/registrations`
          # with the registration id passed as a `?id=` query param. The SDK
          # method `bulk_delete()` doesn't correspond to a URL suffix; passing
          # `/registrations/bulk_delete` returns Cloudflare error 10405
          # ("Method not allowed for this authentication scheme") which is
          # misleadingly an auth-shaped error for what is really a wrong
          # URL/method. See https://developers.cloudflare.com/api/resources/zero_trust/subresources/devices/subresources/registrations/methods/bulk_delete/
          http=$(curl -sS -o /tmp/cf-revoke.json -w '%{http_code}' \
            -X DELETE "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/devices/registrations?id=${reg_id}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          # Echo the API response body so the operator can see the outcome.
          # The body is a normal CF API envelope: {success, errors, messages, result}.
          cat /tmp/cf-revoke.json
          echo
          if [ "$http" != "200" ]; then
            echo "Cloudflare API returned HTTP $http; device row may persist." >&2
            exit 1
          fi
          echo "Device $reg_id revoked successfully."

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          sudo rm -f /var/lib/cloudflare-warp/mdm.xml
