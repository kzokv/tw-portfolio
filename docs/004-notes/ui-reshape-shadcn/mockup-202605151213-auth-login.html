<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vakwen — Sign in (AuthShell)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="./_tokens.css" />
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .auth-card {
    width: 100%; max-width: 400px;
    padding: 36px;
    background: hsl(var(--card));
    border: 1px solid hsl(var(--border));
    border-radius: 16px;
    text-align: center;
  }
  .brand-mark {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--primary) / 0.7));
    color: hsl(var(--primary-foreground));
    display: grid; place-items: center;
    font-size: 24px; font-weight: 700;
    margin: 0 auto 16px;
  }
  .auth-card h1 { font-size: 24px; margin-bottom: 8px; }
  .auth-card .sub { color: hsl(var(--muted-foreground)); font-size: 14px; margin-bottom: 28px; }
  .auth-card .btn { width: 100%; height: 44px; font-size: 14px; }
  .auth-card .btn + .btn { margin-top: 8px; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: hsl(var(--muted-foreground)); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: hsl(var(--border)); }
  .legal { margin-top: 20px; font-size: 11px; color: hsl(var(--muted-foreground)); }
  .legal a { color: hsl(var(--foreground)); }
  .top-corner-theme {
    position: fixed; top: 20px; right: 20px;
  }
</style>
<script>
  const sp = new URLSearchParams(location.search);
  if (sp.get("theme") === "dark") document.documentElement.classList.add("dark");
</script>
</head>
<body>
<div class="top-corner-theme">
  <div class="theme-seg"><button title="Light">☀</button><button class="on">🌓</button><button>🌙</button></div>
</div>
<div class="auth-card">
  <div class="brand-mark">V</div>
  <h1>Sign in to Vakwen</h1>
  <p class="sub">Track your multi-market portfolio. Bring your own data.</p>

  <button class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" style="flex-shrink:0;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09 0-.73.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider">or</div>

  <button class="btn btn-primary">View public share link</button>

  <p class="legal">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy</a>.</p>
</div>
</body>
</html>
