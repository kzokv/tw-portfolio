<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Vakwen — Sign-in error</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="./_tokens.css" />
<style>
  body { min-height:100vh; display:grid; place-items:center; padding:24px; }
  .auth-card { width:100%; max-width: 440px; padding: 36px; background: hsl(var(--card)); border:1px solid hsl(var(--border)); border-radius: 16px; text-align: center; }
  .error-mark { width:56px; height:56px; border-radius:999px; background: hsl(var(--destructive) / 0.12); color:hsl(var(--destructive)); display:grid; place-items:center; font-size:28px; font-weight:700; margin: 0 auto 16px; }
  .error-code { display:inline-flex; align-items:center; padding:3px 10px; border-radius:6px; background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); font-family:"Geist Mono", ui-monospace, monospace; font-size:11px; margin-bottom:16px; }
  .top-corner-theme { position: fixed; top:20px; right:20px; }
  .btn-block { width:100%; height:44px; font-size:14px; }
  .btn-block + .btn-block { margin-top:8px; }
</style>
<script>const sp=new URLSearchParams(location.search); if(sp.get("theme")==="dark") document.documentElement.classList.add("dark");</script>
</head>
<body>
<div class="top-corner-theme">
  <div class="theme-seg"><button>☀</button><button class="on">🌓</button><button>🌙</button></div>
</div>
<div class="auth-card">
  <div class="error-mark">!</div>
  <div class="error-code">ERR · oauth_state_mismatch</div>
  <h1 style="font-size:22px; margin-bottom:8px;">Sign-in didn't complete</h1>
  <p style="color:hsl(var(--muted-foreground)); font-size:14px; margin:0 0 24px; line-height:1.5;">
    Your Google session ended before we could finish signing you in.
    This is usually safe to retry from the start.
  </p>

  <button class="btn btn-primary btn-block">↻ Try signing in again</button>
  <button class="btn btn-block">Back to landing</button>

  <p style="margin-top:24px; font-size:11px; color:hsl(var(--muted-foreground));">
    If this keeps happening, copy error code <span class="mono">oauth_state_mismatch · req-d9a7</span> and contact support.
  </p>
</div>
</body>
</html>
