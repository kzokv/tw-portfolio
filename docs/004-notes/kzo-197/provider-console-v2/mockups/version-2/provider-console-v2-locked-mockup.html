<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KZO-197 Provider Console V2 Locked Mockups</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f7fb;
    --panel: #ffffff;
    --panel-2: #f9fbfd;
    --text: #172033;
    --muted: #667085;
    --line: #d9e0ea;
    --line-strong: #c7d0dd;
    --blue: #2663eb;
    --blue-soft: #eef4ff;
    --green: #16855a;
    --green-soft: #eaf8f1;
    --amber: #b46200;
    --amber-soft: #fff5df;
    --red: #bf2934;
    --red-soft: #fff0f1;
    --slate: #344054;
    --slate-soft: #eef1f6;
    --violet: #6840c6;
    --violet-soft: #f3efff;
    --shadow: 0 16px 44px rgba(27, 38, 54, 0.13);
    --radius: 8px;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 0;
    overflow-x: hidden;
  }

  button, input, select { font: inherit; }
  button { cursor: default; }
  .mono { font-family: var(--mono); }

  .app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 286px minmax(0, 1fr);
  }

  .rail {
    min-height: 100vh;
    border-right: 1px solid var(--line);
    background: #fbfcfe;
    padding: 18px 14px;
  }

  .rail-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .rail-title {
    font-weight: 720;
    font-size: 17px;
  }

  .mini-icon {
    width: 30px;
    height: 30px;
    display: inline-grid;
    place-items: center;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 6px;
    color: var(--slate);
    font-weight: 700;
  }

  .provider-group {
    margin: 16px 0 8px;
  }

  .group-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 7px;
    color: #596579;
    font-size: 11px;
    font-weight: 760;
    text-transform: uppercase;
  }

  .budget-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #344054;
    font-size: 11px;
    font-weight: 650;
    text-transform: none;
    background: var(--slate-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 7px;
  }

  .provider-card {
    display: block;
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    border-radius: var(--radius);
    margin: 4px 0;
    padding: 10px;
    color: var(--text);
    text-align: left;
  }

  .provider-card.active {
    background: var(--panel);
    border-color: var(--line-strong);
    box-shadow: 0 4px 14px rgba(30, 41, 59, 0.07);
  }

  .provider-card .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .provider-name {
    font-weight: 720;
    line-height: 1.2;
  }

  .provider-meta {
    margin-top: 6px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 12px;
  }

  .main {
    padding: 20px 24px 34px;
    min-width: 0;
  }

  .mobile-top {
    display: none;
  }

  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 14px;
  }

  .breadcrumb {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 4px;
  }

  h1 {
    margin: 0;
    font-size: 26px;
    line-height: 1.15;
    letter-spacing: 0;
  }

  h2 {
    margin: 0 0 12px;
    font-size: 16px;
    line-height: 1.25;
  }

  h3 {
    margin: 0;
    font-size: 14px;
  }

  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.45;
  }

  .actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    border: 1px solid var(--line-strong);
    background: var(--panel);
    color: var(--text);
    border-radius: 6px;
    min-height: 34px;
    padding: 7px 11px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-weight: 650;
    white-space: nowrap;
  }

  .btn.primary {
    background: #1f56d5;
    color: white;
    border-color: #1f56d5;
  }

  .btn.warning {
    background: #9d3b00;
    color: white;
    border-color: #9d3b00;
  }

  .btn.danger {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  .btn.ghost {
    border-color: transparent;
    background: transparent;
  }

  .btn.disabled,
  .btn:disabled {
    color: #98a2b3;
    background: #f2f4f7;
    border-color: var(--line);
  }

  .help-dot {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    color: var(--muted);
    display: inline-grid;
    place-items: center;
    font-size: 11px;
    font-weight: 760;
    background: white;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
    overflow: auto;
  }

  .tab {
    border: 0;
    border-bottom: 3px solid transparent;
    background: transparent;
    color: var(--muted);
    padding: 11px 12px 10px;
    font-weight: 680;
    white-space: nowrap;
  }

  .tab.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 720;
    border: 1px solid transparent;
    white-space: nowrap;
  }

  .status::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: currentColor;
  }

  .healthy { color: var(--green); background: var(--green-soft); border-color: #bfe9d3; }
  .degraded { color: var(--amber); background: var(--amber-soft); border-color: #f6d7a5; }
  .down { color: var(--red); background: var(--red-soft); border-color: #fac2c6; }
  .awaiting { color: var(--violet); background: var(--violet-soft); border-color: #d8c9fb; }
  .neutral { color: var(--slate); background: var(--slate-soft); border-color: var(--line); }
  .info { color: #175cd3; background: var(--blue-soft); border-color: #c7d7fe; }

  .layout-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 14px;
  }

  .three-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .two-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    min-width: 0;
  }

  .panel.tight { padding: 0; overflow: hidden; }
  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .metric {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
  }

  .metric .label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 680;
  }

  .metric .value {
    margin-top: 5px;
    font-size: 24px;
    font-weight: 760;
  }

  .metric .sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
  }

  .reason-list {
    display: grid;
    gap: 8px;
  }

  .reason {
    display: grid;
    grid-template-columns: 16px minmax(0, 1fr);
    gap: 9px;
    align-items: start;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 9px;
    background: var(--panel-2);
  }

  .reason .mark {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    margin-top: 2px;
    background: var(--amber);
  }

  .reason.red .mark { background: var(--red); }
  .reason.blue .mark { background: var(--blue); }
  .reason strong { display: block; margin-bottom: 2px; }

  .budget-bar {
    height: 8px;
    background: #edf1f7;
    border-radius: 999px;
    overflow: hidden;
  }

  .budget-bar span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #2f6fed, #1a9a6e);
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .field {
    border: 1px solid var(--line);
    background: white;
    border-radius: 6px;
    min-height: 34px;
    padding: 7px 10px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-width: 140px;
  }

  .field.grow { flex: 1; min-width: 220px; }

  .table-wrap {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    background: white;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: #f7f9fc;
    color: #5c6678;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    padding: 9px 10px;
    border-bottom: 1px solid var(--line);
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #edf0f5;
    vertical-align: top;
  }

  tr:last-child td { border-bottom: 0; }

  .symbol {
    font-family: var(--mono);
    font-weight: 760;
    color: #111827;
  }

  .muted {
    color: var(--muted);
  }

  .tiny {
    font-size: 12px;
    color: var(--muted);
  }

  .selection-banner {
    border: 1px solid #b8c7fb;
    background: var(--blue-soft);
    color: #1849a9;
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .action-cell {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .mini-btn {
    border: 1px solid var(--line);
    background: white;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
    font-weight: 680;
    white-space: nowrap;
  }

  .mini-btn.disabled {
    background: #f2f4f7;
    color: #98a2b3;
  }

  .tooltip-note {
    display: inline-block;
    margin-top: 4px;
    color: #7a8598;
    font-size: 11px;
  }

  .mode-control {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 7px;
    overflow: hidden;
    background: white;
  }

  .mode-control span {
    padding: 7px 10px;
    border-right: 1px solid var(--line);
    font-weight: 680;
    color: var(--muted);
  }

  .mode-control span.active {
    background: #ecfdf4;
    color: #067647;
  }

  .mode-control span:last-child { border-right: 0; }

  .operation-card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px;
    background: var(--panel);
    display: grid;
    gap: 10px;
  }

  .progress {
    height: 10px;
    background: #edf1f7;
    border-radius: 999px;
    overflow: hidden;
  }

  .progress span {
    display: block;
    height: 100%;
    background: #1f56d5;
  }

  .counts {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
  }

  .count-box {
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 8px;
    background: var(--panel-2);
  }

  .count-box strong {
    display: block;
    font-size: 18px;
  }

  .timeline {
    display: grid;
    gap: 10px;
  }

  .timeline-row {
    display: grid;
    grid-template-columns: 92px minmax(0, 1fr);
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid #edf0f5;
  }

  .timeline-row:last-child { border-bottom: 0; }

  .timeline-row strong,
  .timeline-row p,
  .symbol,
  .mono {
    overflow-wrap: anywhere;
  }

  .notice {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 360px;
    border: 1px solid #b8c7fb;
    background: #f2f6ff;
    color: #1849a9;
    box-shadow: var(--shadow);
    border-radius: var(--radius);
    padding: 12px 14px;
    z-index: 20;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(16, 24, 40, 0.36);
    display: flex;
    justify-content: flex-end;
    align-items: stretch;
    z-index: 30;
  }

  .drawer {
    width: 520px;
    background: white;
    box-shadow: var(--shadow);
    padding: 20px;
    overflow: auto;
  }

  .danger-box {
    border: 1px solid #f4b6bc;
    background: var(--red-soft);
    border-radius: var(--radius);
    padding: 12px;
    display: grid;
    gap: 8px;
  }

  .phrase {
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: #fbfcfe;
    padding: 9px 10px;
    font-family: var(--mono);
    color: #111827;
  }

  .settings-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
  }

  .settings-nav {
    border-right: 1px solid var(--line);
    background: #fbfcfe;
    padding: 20px 14px;
  }

  .settings-nav button {
    width: 100%;
    text-align: left;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 7px;
    padding: 10px;
    margin: 2px 0;
    color: var(--muted);
    font-weight: 680;
  }

  .settings-nav button.active {
    color: var(--blue);
    background: var(--blue-soft);
    border-color: #c7d7fe;
  }

  .setting-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 240px;
    gap: 20px;
    padding: 14px 0;
    border-bottom: 1px solid #edf0f5;
  }

  .setting-row:last-child { border-bottom: 0; }

  .mobile-list {
    display: none;
  }

  .mobile-card {
    border: 1px solid var(--line);
    background: white;
    border-radius: var(--radius);
    padding: 12px;
    display: grid;
    gap: 9px;
  }

  .bottom-bar {
    display: none;
  }

  @media (max-width: 820px) {
    .app {
      display: block;
      min-height: 100vh;
    }

    .rail {
      display: none;
    }

    .main {
      padding: 12px 12px 88px;
    }

    .mobile-top {
      display: block;
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .mobile-provider-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      border: 1px solid var(--line-strong);
      background: white;
      border-radius: 7px;
      padding: 10px 12px;
      font-weight: 720;
    }

    .topbar {
      display: block;
      margin-top: 12px;
    }

    h1 {
      font-size: 20px;
    }

    .topbar .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      justify-content: stretch;
      margin-top: 10px;
      overflow: visible;
      flex-wrap: initial;
    }

    .topbar .actions .btn {
      justify-content: center;
      white-space: normal;
      min-width: 0;
    }

    .topbar .actions .btn.primary {
      grid-column: 1 / -1;
    }

    .tabs {
      margin-left: -12px;
      margin-right: -12px;
      padding-left: 12px;
    }

    .layout-grid,
    .three-grid,
    .two-grid,
    .counts,
    .settings-shell,
    .setting-row {
      display: grid;
      grid-template-columns: 1fr;
    }

    .desktop-table {
      display: none;
    }

    .mobile-list {
      display: grid;
      gap: 10px;
    }

    .selection-banner {
      align-items: flex-start;
      display: grid;
      grid-template-columns: 1fr;
    }

    .notice {
      left: 12px;
      right: 12px;
      width: auto;
      bottom: 72px;
    }

    .bottom-bar {
      display: flex;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      background: white;
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      gap: 8px;
    }

    .bottom-bar .btn {
      flex: 1;
      justify-content: center;
    }

    .modal-backdrop {
      align-items: flex-end;
      justify-content: stretch;
    }

    .drawer {
      width: 100%;
      max-height: 92vh;
      border-radius: 14px 14px 0 0;
    }

    .drawer h1 {
      font-size: 22px;
    }

    .drawer .two-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .drawer .timeline-row {
      grid-template-columns: 1fr;
      gap: 4px;
    }

    .settings-nav {
      display: none;
    }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const selectedProvider = "yahoo-finance-kr";

const providerGroups = [
  {
    label: "KR market data",
    budget: "Twelve shared 6/8 per min",
    providers: [
      { id: "twelve-data-kr", label: "Twelve Data KR", status: "degraded", unresolved: "1,942", incidents: 2, ops: 1 },
      { id: "yahoo-finance-kr", label: "Yahoo Finance KR", status: "awaiting", unresolved: "27,212", incidents: 3, ops: 2 }
    ]
  },
  {
    label: "TW market data",
    budget: "FinMind shared 418/600 per hr",
    providers: [
      { id: "finmind-tw", label: "FinMind TW", status: "degraded", unresolved: "328", incidents: 1, ops: 0 }
    ]
  },
  {
    label: "US market data",
    budget: "FinMind shared 418/600 per hr",
    providers: [
      { id: "finmind-us", label: "FinMind US", status: "degraded", unresolved: "96", incidents: 1, ops: 0 }
    ]
  },
  {
    label: "AU market data",
    budget: "mixed budgets",
    providers: [
      { id: "twelve-data-au", label: "Twelve Data AU", status: "healthy", unresolved: "0", incidents: 0, ops: 0 },
      { id: "yahoo-finance-au", label: "Yahoo Finance AU", status: "healthy", unresolved: "0", incidents: 0, ops: 0 },
      { id: "asx-gics-csv", label: "ASX GICS CSV", status: "healthy", unresolved: "0", incidents: 0, ops: 0 }
    ]
  },
  {
    label: "FX",
    budget: "internal pacing",
    providers: [
      { id: "frankfurter", label: "Frankfurter", status: "healthy", unresolved: "0", incidents: 0, ops: 0 }
    ]
  }
];

const tabs = [
  "Overview",
  "Unresolved instruments",
  "Fixer",
  "Operations",
  "Incidents",
  "Activity",
  "Logs",
  "Mappings"
];

function esc(value) {
  return String(value).replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[ch]));
}

function statusLabel(status) {
  return {
    healthy: "Healthy",
    degraded: "Degraded",
    down: "Down",
    awaiting: "Awaiting action",
    info: "Info",
    neutral: "Resolved"
  }[status] || status;
}

function statusBadge(status, text) {
  return `<span class="status ${esc(status)}">${esc(text || statusLabel(status))}</span>`;
}

function providerRail() {
  return `
    <aside class="rail">
      <div class="rail-head">
        <div>
          <div class="rail-title">Providers</div>
          <div class="tiny">Operations console</div>
        </div>
        <span class="mini-icon">R</span>
      </div>
      ${providerGroups.map((group) => `
        <section class="provider-group">
          <div class="group-label">
            <span>${esc(group.label)}</span>
            <span class="budget-pill">${esc(group.budget)}</span>
          </div>
          ${group.providers.map((provider) => `
            <button class="provider-card ${provider.id === selectedProvider ? "active" : ""}">
              <span class="top">
                <span class="provider-name">${esc(provider.label)}</span>
                ${statusBadge(provider.status, statusLabel(provider.status))}
              </span>
              <span class="provider-meta">
                <span>${esc(provider.unresolved)} unresolved</span>
                <span>${provider.incidents} incidents</span>
                <span>${provider.ops} ops</span>
              </span>
            </button>
          `).join("")}
        </section>
      `).join("")}
    </aside>
  `;
}

function tabBar(active) {
  return `
    <nav class="tabs" aria-label="Provider sections">
      ${tabs.map((tab) => `<button class="tab ${tab === active ? "active" : ""}">${esc(tab)}</button>`).join("")}
    </nav>
  `;
}

function shell(activeTab, content, options = {}) {
