services:
  postgres-ci:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: tw_portfolio_ci
    ports:
      - "${CI_DB_PORT:-15432}:5432"
    volumes:
      - pgdata_ci_integration:/var/lib/postgresql/data

  redis-ci:
    image: redis:7
    ports:
      - "${CI_REDIS_PORT:-16379}:6379"

volumes:
  pgdata_ci_integration:
