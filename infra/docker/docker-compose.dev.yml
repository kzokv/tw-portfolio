services:
  vakwen-dev-postgres:
    image: postgres:16
    container_name: vakwen-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vakwen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vakwen}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - vakwen-dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vakwen} -d ${POSTGRES_DB:-vakwen}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "5454:5432"

  vakwen-dev-redis:
    image: redis:7
    container_name: vakwen-dev-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - vakwen-dev-net
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "6363:6379"

  vakwen-dev-migrate:
    profiles: ["migrate"]
    build:
      context: ../..
      dockerfile: db/Dockerfile.migrate
    image: vakwen-dev-migrate:${IMAGE_TAG:-latest}
    container_name: vakwen-dev-migrate
    depends_on:
      vakwen-dev-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: vakwen-dev-postgres
      PGUSER: ${POSTGRES_USER:-vakwen}
      PGDATABASE: ${POSTGRES_DB:-vakwen}
    networks:
      - vakwen-dev-net
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  vakwen-dev-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
    image: vakwen-dev-api:${IMAGE_TAG:-latest}
    container_name: vakwen-dev-api
    restart: unless-stopped
    depends_on:
      vakwen-dev-postgres:
        condition: service_healthy
      vakwen-dev-redis:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env.dev}
    environment:
      NODE_ENV: production
      DB_URL: postgres://${POSTGRES_USER:-vakwen}:${POSTGRES_PASSWORD}@vakwen-dev-postgres:5432/${POSTGRES_DB:-vakwen}
      REDIS_URL: redis://:${REDIS_PASSWORD}@vakwen-dev-redis:6379
      API_PORT: "4000"
      ALLOWED_ORIGINS: https://${PUBLIC_DOMAIN_WEB:-vakwen-dev-web.kzokvdevs.dpdns.org}
      APP_BASE_URL: https://${PUBLIC_DOMAIN_WEB:-vakwen-dev-web.kzokvdevs.dpdns.org}
      GOOGLE_REDIRECT_URI: https://${PUBLIC_DOMAIN_API:-vakwen-dev-api.kzokvdevs.dpdns.org}/auth/google/callback
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-g_auth_session}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.kzokvdevs.dpdns.org}
    networks:
      - vakwen-dev-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  vakwen-dev-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-0}
        NEXT_PUBLIC_API_BASE_URL: https://${PUBLIC_DOMAIN_API:-vakwen-dev-api.kzokvdevs.dpdns.org}
        NEXT_PUBLIC_AUTH_MODE: oauth
    image: vakwen-dev-web:${IMAGE_TAG:-latest}
    container_name: vakwen-dev-web
    restart: unless-stopped
    depends_on:
      vakwen-dev-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-g_auth_session}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      # Build-time NEXT_PUBLIC_* args are NOT inherited by the Dockerfile runtime
      # stage; the web server (proxy.ts, auth.ts) reads process.env at runtime.
      NEXT_PUBLIC_AUTH_MODE: oauth
      DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.kzokvdevs.dpdns.org}
      SERVER_API_BASE_URL: http://vakwen-dev-api:4000
    networks:
      - vakwen-dev-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vakwen-dev-cloudflared
    restart: unless-stopped
    depends_on:
      vakwen-dev-web:
        condition: service_healthy
      vakwen-dev-api:
        condition: service_healthy
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    networks:
      - vakwen-dev-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata_dev:

networks:
  vakwen-dev-net:
    driver: bridge
